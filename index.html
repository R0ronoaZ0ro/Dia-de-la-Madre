<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <title>Feliz Cumpleaños</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="mobile.css"
      media="only screen and (max-width: 768px)"
    />
  </head>
  <body>
    <!--Confeti Atras-->
    <canvas id="canvas1"></canvas>

    <div class="contenedor">
      <div class="portaretrato-torta-caja">
        <!-- Caja De Regalo (movida a la posición de la torta) -->
        <div class="caja-wrapper caja-en-torta">
          <div class="caja">
            <div class="cinta-de-regalo">
              <div class="cinta-de-regalo-izquierda"></div>
              <div class="cinta-de-regalo-derecha"></div>
              <div class="cinta-de-regalo-centro"></div>
            </div>
            <div class="regalos">
              <div class="regalo-sombra"></div>
            </div>
            <div class="regalo"></div>
            <div class="icono-estrella estrella1"></div>
            <div class="icono-estrella estrella2"></div>
            <div class="icono-estrella estrella3"></div>
            <div class="icono-estrella estrella4"></div>
            <div class="icono-estrella estrella5"></div>
          </div>
        </div>

        <!--Botón Presiona (reemplaza la llama)--> 
        <div class="boton-container">
          <button class="boton-presiona" id="botonPresiona" aria-label="Presiona">Presiona</button>
        </div>

  <!--Mensaje: Feliz día de la mujer-->
  <div class="happy-birthday">Feliz Día de la Mujer</div>
      </div>

      <!--Mesa-->
      <div class="soporte"></div>
    </div>

    <!-- Carta Modal -->
    <div class="modal-carta" id="modalCarta">
      <div class="contenido-carta">
        <div class="carta">
          <h2>Querida Mamá</h2>
          <p>
            En este día tan especial quiero desearte un <strong>Feliz Día de la Mujer</strong>, <strong>mamá</strong>. Gracias por tu <strong>amor</strong>, tu fuerza y todo lo que haces cada día. Eres un ejemplo para mí
            y te deseo un día lleno de cariño, alegría y momentos hermosos. 💐💜
          </p>
          <p class="firma">Con cariño,<br />Tu Hijo</p>
        </div>
      </div>
    </div>

    <!--Confeti Delante-->
    <canvas id="canvas2"></canvas>

    <!--Todo Oscuro-->
    <audio id="soplido" src="/proyectos/Feliz Cumpleaños/recursos/soplar1.mp3" preload="auto"></audio>
    <div class="overlay"></div>

    <script src="Confeti.js"></script>
    <script src="Confeti2.js"></script>
    <script src="Sorpresa.js"></script>

    <!-- Nota: la apertura del modal por clic en el regalo queda gestionada en Sorpresa.js; el botón solo activa la sorpresa -->
  </body>
</html>
