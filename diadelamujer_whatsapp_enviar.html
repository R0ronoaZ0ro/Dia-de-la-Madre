<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <title>Feliz Día de la Mujer</title>

    <!-- INLINED: styles.css -->
    <style>
html {
  overflow: hidden; 
}

body {
  background-color: rgba(235, 224, 255, 1); /* lavanda suave */
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/*Confeti Atras*/
#canvas1 {
  position: absolute; 
  top: 0;
  left: 0;
  display: block;
  pointer-events: none;
  z-index: 0;
}

/*Ajustamos para dejarlo en caida [contendor  de los objetos / mesa]*/
.contenedor {
  display: flex;
  flex-direction: column; 
  align-items: center;    
}

/* Portaretrato + torta + caja de regalo */
.portaretrato-torta-caja {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  width: 520px;
  gap: 20px;
  position: relative;
  bottom: -50px;
}

/* Mesa */
.soporte {
  position: relative;
  width: 500px;
  left: -20px;
  bottom: -50px;
  height: 20px;
  border-radius: 100px;
  background-color: #4A4A4A;
}

.soporte::before {
  content: "";
  position: absolute;
  width: 100px;
  height: 1000px;
  background-color: #4A4A4A;
  left: 195px;
  top: 18px;
}

.soporte::after {
  content: "";
  position: absolute;
  background-color: rgba(235, 224, 255, 1);
  width: 95px;
  height: 1000px;
  border-radius: 30px 30px 0 0;
  left: 136px;
  top: 20px;
  box-shadow: 125px 0 rgba(205, 178, 235, 1);
}

/*PortaRetrato*/
.portaretrato {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.marco {
  width: 50px;
  height: 50px;
  padding: 5px;
  background-color: #bb7d4e; 
  border: 5px solid #8a5e3c; 
  box-shadow: 0 4px 8px rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
}

.marco img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.soporte-marco {
  width: 50px;
  height: 15px;
  background-color: #8a5e3c; 
  margin-top: -5px;
  clip-path: polygon(0 0, 100% 0, 80% 100%, 20% 100%);
}

/*Torta De Cumpleaños*/
.torta-cumpleaños {
  position: relative;
  width: 274px;  /* mismo ancho que la torta */
  height: 180px; /* espacio para torta + vela + llama */
  display: flex;
  justify-content: center;
  align-items: flex-end;
}

.torta {
  position: absolute;
  overflow: hidden;
  width: 274px;
  height: 140px;
  background-color: #FDE8C8;
  bottom: 0; /* pegada abajo del contenedor */
  left: 0; /* centrada horizontalmente */
  border-radius: 30px 30px 0 0;
}

.torta:before {
  content: "";
  position: absolute;
  background-color: #D8B2F0; /* morado claro */
  width: 275px;
  height: 15px;
  top: 75px;
  box-shadow: 0 30px #D8B2F0;
}

.torta:after {
  content: "";
  position: absolute;
  background-color: #9B59B6; /* morado */
  width: 275px;
  height: 40px;
}

.chocolate {
  position: absolute;
  background-color: #9B59B6;
  width: 25px;
  height: 45px;
  top: 25px;
  left: 0;
  z-index: 1;
  border-radius: 50px;
  box-shadow: 25px 2px #F0E6FF, 50px -10px #9B59B6, 
              75px -5px #F0E6FF, 100px 3px #9B59B6,
              125px 0px #F0E6FF, 150px -5px #9B59B6,
              175px 3px #F0E6FF, 200px -5px #9B59B6,
              225px -10px #F0E6FF, 250px 4px #9B59B6;
}

.caja {
  position: relative;
  left: -20px;      
  width: 170px; /* ancho del objeto (aumentado) */
  height: 200px; /* alto total (caja + cinta + estrellas) (aumentado) */
  display: flex;
  justify-content: center;
  align-items: flex-end;
}

.vela:before {
  content: "";
  position: absolute;
  width: 15px;
  height: 15px;
  background-color: #8E44AD;
  top: 10px;
  box-shadow: 0 25px #8E44AD; 
}

.vela:after {
  content: "";
  position: absolute;
  width: 2px;
  height: 15px;
  background-color: black;
  top: -15px;
  left: 6px;
}

.llama {
  position: absolute;
  bottom: 210px; /* encima de la vela */
  left: calc(50% - 10px);
  width: 20px;
  height: 30px;
  background: radial-gradient(ellipse at bottom, rgba(255, 255, 180, 1) 0%, rgba(255, 200, 0, 0.9) 50%, rgba(255, 120, 0, 0.6) 80%, transparent 100%);
  border-radius: 50%;
  filter: blur(0.5px);
  animation: flama 0.15s infinite alternate ease-in-out;
  opacity: 0.95;
  cursor: pointer;
  z-index: 10000;
}

@keyframes flama {
  from {
    transform: scale(1, 1) translateY(0);
    background: radial-gradient(ellipse at bottom, rgba(255, 255, 180, 1) 0%, rgba(255, 200, 0, 0.9) 50%, rgba(255, 120, 0, 0.6) 80%, transparent 100%);
  }
  50% {
    transform: scale(1.1, 1.2) translateY(-2px);
    background: radial-gradient(ellipse at bottom, rgba(255, 255, 200, 1) 0%, rgba(255, 170, 0, 0.85) 50%, rgba(255, 80, 0, 0.5) 80%, transparent 100%);
  }
  to {
    transform: scale(0.9, 1.05) translateY(1px);
    background: radial-gradient(ellipse at bottom, rgba(255, 250, 180, 1) 0%, rgba(255, 190, 0, 0.88) 50%, rgba(255, 90, 0, 0.55) 80%, transparent 100%);
  }
}

/* Botón Presiona (reemplaza la llama): estilos bonitos e interactivos */
.boton-container {
  position: absolute;
  bottom: 110px; /* ajuste para que quede donde estaba la llama/torta */
  left: 50%;
  transform: translateX(-50%);
  z-index: 10001; /* encima del overlay (overlay tiene z-index:9999) */
}

.boton-presiona {
  -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
  border: none;
  padding: 12px 28px;
  font-size: 41px;
  border-radius: 999px;
  background: linear-gradient(90deg, #B39DD8 0%, #9B59B6 50%, #8E44AD 100%);
  color: #fff;
  box-shadow: 0 10px 24px rgba(141, 100, 200, 0.18), 0 2px 6px rgba(0,0,0,0.12);
  cursor: pointer;
  transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease, opacity 0.25s ease;
  font-family: 'Pacifico';
  z-index: 10002; /* asegurar que el botón quede por encima */
  position: relative; /* para pseudo-elementos de efecto */
  overflow: hidden;
  animation: botonGlow 2s ease-in-out infinite;
}

.boton-presiona:hover {
  transform: translateY(-4px) scale(1.04);
  filter: brightness(1.06);
  box-shadow: 0 22px 50px rgba(142,68,173,0.30), 0 6px 18px rgba(108,52,131,0.12);
}
.boton-presiona::before {
  content: "";
  position: absolute;
  left: -60%;
  top: -40%;
  width: 220%;
  height: 180%;
  background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.6), rgba(255,255,255,0.12) 24%, transparent 48%),
              radial-gradient(circle at 80% 80%, rgba(179,157,216,0.12), transparent 40%);
  transform: translateX(0) rotate(10deg);
  transition: transform 0.6s ease, opacity 0.45s ease;
  pointer-events: none;
  opacity: 1;
  mix-blend-mode: screen;
  filter: blur(6px);
}
.boton-presiona:hover::before {
  transform: translateX(40%) rotate(10deg) scale(1.02);
}
@keyframes botonGlow {
  0% { box-shadow: 0 10px 32px rgba(141,100,200,0.16), 0 2px 6px rgba(108,52,131,0.06); transform: translateY(0) scale(1); }
  50% { box-shadow: 0 28px 68px rgba(141,100,200,0.32), 0 8px 22px rgba(108,52,131,0.12); transform: translateY(-3px) scale(1.02); }
  100% { box-shadow: 0 10px 32px rgba(141,100,200,0.16), 0 2px 6px rgba(108,52,131,0.06); transform: translateY(0) scale(1); }
}

/* pseudo glow layer (purple) */
.boton-presiona::after {
  content: "";
  position: absolute;
  inset: -10% -10% -10% -10%;
  pointer-events: none;
  background: radial-gradient(circle at 50% 30%, rgba(155,89,182,0.18), rgba(142,68,173,0.10) 40%, transparent 60%);
  opacity: 0.9;
  filter: blur(8px);
  transition: opacity 0.4s ease, transform 0.4s ease;
  z-index: 0;
  mix-blend-mode: screen;
  animation: botonPulse 2s ease-in-out infinite;
}

@keyframes botonPulse {
  0% { transform: scale(1); opacity: 0.85; }
  50% { transform: scale(1.02); opacity: 1; }
  100% { transform: scale(1); opacity: 0.85; }
}

.boton-presiona:active {
  transform: translateY(0);
  box-shadow: 0 6px 12px rgba(0,0,0,0.12);
}

/* Ajustes para la caja cuando está en la posición de la torta */
.caja-en-torta {
  transform: scale(1.15) translateY(6px); /* agrandar el regalo cuando está en la posición de la torta */
}

/* transición para que el botón se desvanezca al usarse */
.boton-presiona.desaparecer {
  opacity: 0;
  transform: scale(0.6) translateY(6px);
  pointer-events: none;
}

/*Todo Oscuro*/
.overlay {
  position: fixed;
  inset: 0;
  /* oscuro con tinte violeta */
  background-color: rgba(20, 8, 40, 0.99);
  opacity: 1;
  z-index: 9999;
  transition: opacity 1.5s ease;
}
.overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

@keyframes apagar {
  from { transform: scale(1); opacity: 1; }
  to { transform: scale(0); opacity: 0; }
}

.caja-wrapper {
  transform: scale(0.75);
  transform-origin: center bottom; /* para que se reduzca hacia el centro y desde la base */
}

/*Regalo De Cumpleaños*/
.caja {
  position: relative;
  left: -30px;      
  width: 150px; /* ancho del objeto */
  height: 180px; /* alto total (caja + cinta + estrellas)*/
  display: flex;
  justify-content: center;
  align-items: flex-end;
}

/* Elementos de la caja */
.cinta-de-regalo,
.cinta-de-regalo-izquierda,
.cinta-de-regalo-derecha,
.cinta-de-regalo-centro,
.regalos,
.regalo-sombra,
.regalo {
  position: absolute;
}

.cinta-de-regalo {
  bottom: 110px; /* ajustado para que quede encima */
  left: calc(50% - 27px);
  width: 54px; /* aumentado 20px */
  height: 43px; /* aumentado 20px */
  animation: cinta 1.5s ease-in-out infinite;
  border: 1px solid rgba(0,0,0,0.12); /* contorno sutil */
  box-shadow: 0 6px 10px rgba(0,0,0,0.04);
}

.cinta-de-regalo-centro {
  border-radius: 12px;
  width: 100%;
  height: 100%;
  background-color: #A569BD;
  border: 1px solid rgba(0,0,0,0.12);
}

.cinta-de-regalo-izquierda,
.cinta-de-regalo-derecha {
  box-shadow: 0 0 0 8px #C39BD3 inset; 
  top: 3.4px;
  width: 65px; /* aumentado 20px */
  height: 77px; /* aumentado 20px */
  background-color: #A569BD;
  border: 1px solid rgba(0,0,0,1);
}

.cinta-de-regalo-izquierda {
  border-radius: 17px 0 34px 11px / 17px 0 34px 40px;
  right: calc(100% - 12px);
  transform: rotate(35deg);
  transform-origin: 100% 15%;
}
.cinta-de-regalo-izquierda::before {
  background-color: #C39BD3;
  border-radius: inherit;
  content: "";
  position: absolute;
  inset: 0;
  clip-path: polygon(0 42%, 100% 12%, 100% 100%, 0 100%);
  box-shadow: inset 0 -4px rgba(0,0,0,1);
}

.cinta-de-regalo-derecha {
  border-radius: 0 17px 11px 34px / 0 17px 40px 34px;
  left: calc(100% - 12px);
  transform: rotate(-35deg);
  transform-origin: 0% 15%;
}

.cinta-de-regalo-derecha::before {
  background-color: #C39BD3;
  border-radius: inherit;
  content: "";
  position: absolute;
  inset: 0;
  clip-path: polygon(0 12%, 100% 42%, 100% 100%, 0 100%);
  box-shadow: inset 0 -4px rgba(0,0,0,1);
}

/* Base de la caja */
.regalos {
  animation: base 1.5s ease-in-out infinite;
  background: linear-gradient(#A569BD, #8E44AD) 50% 50% / 32px 100% no-repeat, #efe8fb;
  border-radius: 16px;
  bottom: 0;
  left: calc(50% - 70.2px); /* ajustado por el aumento de ancho */
  width: 140.4px; /* aumentado 20px */
  height: 100px; /* aumentado 20px */
  border: 1px solid rgba(0,0,0,1); /* contorno sutil para separar del fondo */
  box-shadow: 0 6px 14px rgba(0,0,0,1);
  overflow: hidden;
  cursor: pointer;
}

.regalo {
  animation: techo 1.5s ease-in-out infinite;
  background: linear-gradient(#B39DD8, #9B59B6) 50% 50% / 32px 101% no-repeat, #f6f0ff;
  bottom: 87px; /* ajustado para mantener separación visual */
  left: calc(50% - 76.5px); /* ajustado por el aumento de ancho */
  width: 153px; /* aumentado 20px */
  height: 54px; /* aumentado 20px */
  border-radius: 10px;
  border: 1px solid rgba(0,0,0,1); /* contorno sutil */
  box-shadow: 0 8px 18px rgba(0,0,0,1);
  cursor: pointer;
}

.regalo-sombra {
  animation: sombra 1.5s ease-in-out infinite;
  background-color: rgba(0,0,0,0.06);
  bottom: 87px; /* ajustado para mantener separación visual */
  left: calc(50% - 86.5px); /* ajustado por el aumento de ancho */
  width: 153px; /* aumentado 20px */
  height: 54px; /* aumentado 20px */
  border-radius: 10px;
}

/* Estrellas animadas */
.icono-estrella {
  position: absolute;
  background-color: #FFD700; /* dorado para mayor contraste */
  clip-path: polygon(50% 0, 65% 35%, 100% 50%, 65% 65%, 50% 100%, 35% 65%, 0 50%, 35% 35%);
}

.estrella1 { animation: estrella1 1.5s ease-in-out infinite; animation-delay: calc(1.5s * 0.5);  bottom: 20px;  left: 120px; width: 39px; height: 39px; }
.estrella2 { animation: estrella2 1.5s ease-in-out infinite; animation-delay: calc(1.5s * 0.125); top: 10px;   left: 100px; width: 39px; height: 39px; }
.estrella3 { animation: estrella1 1.5s ease-in-out infinite; animation-delay: calc(1.5s * 0.25);  top: 60px;   left: 50px;  width: 31px; height: 31px; }
.estrella4 { animation: estrella2 1.5s ease-in-out infinite; bottom: 5px;  left: 20px;  width: 39px; height: 39px; }
.estrella5 { animation: estrella2 1.5s ease-in-out infinite; animation-delay: calc(1.5s * 0.375); top: 20px;   left: 20px;  width: 31px; height: 31px; }

/*Animaciones Regalo*/
@keyframes cinta {
  from,
  50% {
    transform: translateY(0) rotate(0);
  }
  62.5% {
    transform: translateY(75%) rotate(0);
  }
  68.75% {
    transform: translateY(-37.5%) rotate(15deg);
  }
  75% {
    transform: translateY(-150%) rotate(5deg);
  }
  87.5% {
    transform: translateY(65%) rotate(-3deg);
  }
  to {
    transform: translateY(0) rotate(0);
  }
}

@keyframes base {
  from,
  50% {
    transform: translateY(0) scale(1, 1);
  }
  62.5% {
    transform: translateY(4%) scale(1.12, 0.89);
  }
  75% {
    transform: translateY(-11%) scale(0.92, 1.1);
  }
  87.5% {
    transform: translateY(0%) scale(1.05, 0.9);
  }
  to {
    transform: translateY(0) scale(1, 1);
  }
}

@keyframes techo {
  from,
  50% {
    transform: translateY(0) scale(1, 1) rotate(0);
  }
  62.5% {
    animation-timing-function: ease-in;
    transform: translateY(45%) scale(1.14, 0.95) rotate(0);
  }
  68.75% {
    animation-timing-function: ease-out;
    transform: translateY(-22.5%) scale(1.05, 1.03) rotate(15deg);
  }
  75% {
    animation-timing-function: ease-out;
    transform: translateY(-90%) scale(0.96, 1.1) rotate(5deg);
  }
  87.5% {
    transform: translateY(30%) scale(1.12, 0.93) rotate(-3deg);
  }
  to {
    transform: translateY(0) scale(1, 1) rotate(0);
  }
}

@keyframes sombra {
  from,
  50% {
    transform: translateY(0) scale(1, 1) rotate(0);
  }
  62.5% {
    animation-timing-function: ease-in;
    transform: translateY(10%) scale(1.14, 0.95) rotate(0);
  }
  68.75% {
    animation-timing-function: ease-out;
    transform: translateY(-10%) scale(1.05, 1.03) rotate(15deg);
  }
  75% {
    animation-timing-function: ease-out;
    transform: translateY(-30%) scale(0.96, 1.1) rotate(5deg);
  }
  87.5% {
    transform: translateY(10%) scale(1.12, 0.93) rotate(-3deg);
  }
  to {
    transform: translateY(0) scale(1, 1) rotate(0);
  }
}

@keyframes estrella1 {
  from {
    transform: scale(0) rotate(0);
  }
  25% {
    animation-timing-function: ease-out;
    transform: scale(1) rotate(0.25turn);
  }
  50%,
  to {
    transform: scale(0) rotate(0.5turn);
  }
}

@keyframes estrella2 {
  from {
    transform: scale(0) rotate(0);
  }
  25% {
    animation-timing-function: ease-out;
    transform: scale(1) rotate(-0.25turn);
  }
  50%,
  to {
    transform: scale(0) rotate(-0.5turn);
  }
}

/*Mensaje*/
.happy-birthday {
    position: absolute;
    top: -153px; /* Ajusta la distancia vertical desde la torta */
    left: 4%;
    transform: translateX(-50%);
    font-family: 'Pacifico', cursive;
    font-size: 54px;
  color: #6C3483; 
    user-select: none;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.15);
    animation: flotar 2s ease-in-out infinite,
               brillo 1.5s infinite;
}

/* Modal */
.modal-carta {
  position: fixed;
  inset: 0;
  background-color: rgba(0, 0, 0, 0.85);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.modal-carta.activo {
  opacity: 1;
  pointer-events: auto;
}

/*Carta*/
.carta {
  background: linear-gradient(135deg, #f6f0ff, #e9ddff);
  padding: 32px;
  width: 400px;
  max-width: 80%;
  border-radius: 12px;
  border: 3px solid #b9a0e6; 
  box-shadow: 0 0 25px rgba(141, 100, 200, 0.25);
  font-family: 'Georgia', serif;
  position: relative;
  animation: aparecer 0.8s ease;
}

.carta h2 {
  font-family: cursive;
  font-size: 28px;
  color: #6C3483; 
  margin-bottom: 16px;
  text-align: center;
}

.carta p {
  font-size: 17px;
  line-height: 1.5;
  color: #333;
}

.carta .firma {
  margin-top: 32px;
  font-style: italic;
  text-align: right;
  color: #323232;
}

/* Animación de entrada */
@keyframes aparecer {
  from {
    opacity: 0;
    transform: scale(0.9);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

/* Animación flotante */
@keyframes flotar {
    from, to {
        transform: translate(0, 0);
    }
    50% {
        transform: translate(0, -8px);
    }
}

@keyframes brillo {
  from, to {
    text-shadow: 0 0 3px #fff, 0 0 6px #6C3483, 0 0 9px #6C3483;
  }
  50% {
    text-shadow: 0 0 6px #fff, 0 0 12px #6C3483, 0 0 18px #6C3483;
  }
}

/*Confeti Delante*/
#canvas2 {
  position: absolute; 
  top: 0;
  left: 0;
  display: block;
  z-index: 2;
  pointer-events: none;
}

    </style>

}

}

    <!-- INLINED: Confeti.js -->
    <script>
// Confetis

//
// 1. Configuración Inicial
window.oncontextmenu = function () {
  return false;
};

const canvasConfeti = document.getElementById("canvas1"); //Lienzo
const ctxConfeti = canvasConfeti.getContext("2d"); // Funciones

let ancho = (canvasConfeti.width = window.innerWidth);
let alto = (canvasConfeti.height = window.innerHeight);

let confetis = [];

const coloresConfeti = [
  "rgba(155, 89, 182, 1)",   // #9B59B6
  "rgba(179, 157, 216, 1)",  // #B39DD8
  "rgba(195, 155, 211, 1)",  // #C39BD3
  "rgba(147, 112, 219, 1)",  // #9370DB
  "rgba(211, 167, 219, 1)",  // #D3A7DB
  "rgba(255, 255, 255, 1)",
];

function crearConfeti() {
  const cantidad = 100;
  for (let i = 0; i < cantidad; i++) {
    confetis.push({
      x: Math.random() * ancho, // Posición Horizontal Aleatoria
      y: Math.random() * -alto, // Posición Vertical Aleatoria (Desde arriba por el negativo)
      r: Math.random() * 5 + 2, // Radio Aleatorio (2 y 7 Pixeles)
      color: coloresConfeti[Math.floor(Math.random() * coloresConfeti.length)],
      velocidadY: Math.random() * 2 + 1, // Velocidad Aleatoria (1 y 3 Pixeles/Frame)
    });
  }
}

function animarConfeti() {
  ctxConfeti.fillStyle = "rgba(235, 224, 255, 1)"; // Fondo lavanda pastel
  ctxConfeti.fillRect(0, 0, ancho, alto);

  for (let i = 0; i < confetis.length; i++) {
    let confetiActual = confetis[i];

    ctxConfeti.beginPath(); // Empezamos Una Nueva Figura
    ctxConfeti.arc(
      confetiActual.x,
      confetiActual.y,
      confetiActual.r,
      0,
      Math.PI * 2
    ); // Dibujamos Un Círculo
    ctxConfeti.fillStyle = confetiActual.color; // Color
    ctxConfeti.fill(); // Rellenamos El Círculo

    // Movimiento (Caída Libre)
    confetiActual.y += confetiActual.velocidadY;

    // Si Termina De Caer, Aparece Arriba Nuevamente
    if (confetiActual.y > alto) {
      confetiActual.y = -10;
      confetiActual.x = Math.random() * ancho;
    }
  }

  // Animación Continua (Llama de nuevo a la función)
  requestAnimationFrame(animarConfeti);
}

crearConfeti();

// Ajustar tamaño del canvas al redimensionar
window.addEventListener('resize', () => {
  ancho = canvasConfeti.width = window.innerWidth;
  alto = canvasConfeti.height = window.innerHeight;
});

// Esperar 1 segundo antes de iniciar el confeti
setTimeout(() => {
  animarConfeti();
}, 1500);
    </script>

    <!-- INLINED: Confeti2.js -->
    <script>
// Confeti Adelante

window.oncontextmenu = function () {
  return false;
};

const canvasConfeti2 = document.getElementById("canvas2");
const ctxConfeti2 = canvasConfeti2.getContext("2d");

let ancho2 = (canvasConfeti2.width = window.innerWidth);
let alto2 = (canvasConfeti2.height = window.innerHeight);

let confetis2 = [];

const coloresConfeti2 = [
  "rgba(155, 89, 182, 1)",
  "rgba(179, 157, 216, 1)",
  "rgba(195, 155, 211, 1)",
  "rgba(147, 112, 219, 1)",
  "rgba(211, 167, 219, 1)",
  "rgba(255, 255, 255, 1)",
];

function crearConfeti2() {
  const cantidad = 100;
  for (let i = 0; i < cantidad; i++) {
    confetis2.push({
      x: Math.random() * ancho2,
      y: Math.random() * -alto2,
      r: Math.random() * 5 + 2,
      color:
        coloresConfeti2[Math.floor(Math.random() * coloresConfeti2.length)],
      velocidadY: Math.random() * 2 + 1,
    });
  }
}

function animarConfeti2() {
  ctxConfeti2.clearRect(0, 0, ancho2, alto2);

  for (let i = 0; i < confetis2.length; i++) {
    let c = confetis2[i];
    ctxConfeti2.beginPath();
    ctxConfeti2.arc(c.x, c.y, c.r, 0, Math.PI * 2);
    ctxConfeti2.fillStyle = c.color;
    ctxConfeti2.fill();

    c.y += c.velocidadY;
    if (c.y > alto2) {
      c.y = -10;
      c.x = Math.random() * ancho2;
    }
  }

  requestAnimationFrame(animarConfeti2);
}

crearConfeti2();

window.addEventListener('resize', () => {
  ancho2 = canvasConfeti2.width = window.innerWidth;
  alto2 = canvasConfeti2.height = window.innerHeight;
});

// Esperar 1 segundo antes de iniciar el confeti
setTimeout(() => {
  animarConfeti2();
}, 1500);
    </script>

    <!-- INLINED: Sorpresa.js -->
    <script>
// Carta
const regalo = document.querySelector(".regalo");
const regalos = document.querySelector(".regalos");
const modalCarta = document.getElementById("modalCarta");

if (regalo) {
  regalo.addEventListener("click", () => {
    modalCarta.classList.add("activo");
  });
}

if (regalos) {
  regalos.addEventListener("click", () => {
    modalCarta.classList.add("activo");
  });
}

if (modalCarta) {
  modalCarta.addEventListener("click", () => {
    modalCarta.classList.remove("activo");
  });
}

// Todo Oscuro (sin audio)
const overlay = document.querySelector(".overlay");
const llama = document.querySelector(".llama");

// Función reutilizable para ejecutar la «sorpresa» (audio + mostrar contenido)

let sorpresaActivada = false; // evita re-activaciones múltiples

function activarSorpresa(el) {
  if (sorpresaActivada) return;
  sorpresaActivada = true;


  // Si se pasa un elemento visual (como la llama), podemos aplicar la animación "apagar"
  if (el && el.style) {
    el.style.animation = "apagar 0.5s forwards";
  }

  setTimeout(() => {
    // Mostrar contenido visual (sin sonido)
    if (overlay) overlay.classList.add("hidden");

    // Hacer desaparecer el botón si existe
    const boton = document.getElementById('botonPresiona');
    if (boton) {
      boton.classList.add('desaparecer');
      // Tras la transición, retiramos del flujo para evitar tab-navegación
      setTimeout(() => {
        try { boton.style.display = 'none'; } catch (e) {}
      }, 600);
    }
  }, 1000);
}

// Si la llama existe (si no fue eliminada), enlazamos el evento; de lo contrario no hacemos nada
if (llama) {
  llama.addEventListener("click", () => activarSorpresa(llama));
}

// Enlazar el nuevo botón que reemplaza la llama
const botonPresiona = document.getElementById('botonPresiona');
if (botonPresiona) {
  botonPresiona.addEventListener('click', () => activarSorpresa(botonPresiona));
}
    </script>
